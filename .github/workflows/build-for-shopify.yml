name: Build and push to build branch

concurrency:
  group: primary-build-${{ github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

on:
  push:
    branches:
      - build/*
      - main
    paths-ignore:
      - README.md
  pull_request:
    branches:
      - build/*
      - main

jobs:
  build-and-push:
    if: ${{ !contains(github.event.head_commit.author.name, 'shopify[bot]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Project
        run: pnpm vite:build

      - name: Extract branch name
        id: extract_branch
        shell: bash
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "BUILD_BRANCH=${BRANCH_NAME}-build" >> $GITHUB_OUTPUT

      - name: Add files to -build branch
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # Create a new branch from the current state
          git checkout -b "${{ steps.extract_branch.outputs.BUILD_BRANCH }}" || true

          # Only commit the built assets, not any workflow changes
          git reset --soft HEAD~1 || true  # Undo the current commit but keep changes staged
          git reset HEAD .  # Unstage everything
          git add -f assets/*.js assets/*.css assets/*.svg snippets/vite-tag.liquid sections/  # Only stage valid built assets

          # Create a clean commit with just the built assets
          git commit -m "Update built assets for ${{ steps.extract_branch.outputs.BRANCH_NAME }}"

      - name: Push changes to build branches
        if: ${{ github.event_name == 'push' }}
        run: |
          git config --global --add --bool push.autoSetupRemote true
          git push --force